<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antrian — Dimsum Denaya</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2563EB; --primary-dark: #1E40AF;
      --bg: #F8FAFC; --surface: #FFFFFF;
      --text: #111827; --muted: #64748B;
      --success: #10B981; --warning: #F59E0B;
      --danger: #EF4444; --border: #E2E8F0;
      --radius: 16px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header-display {
      background: linear-gradient(135deg, var(--primary), #7C3AED);
      color: white;
      padding: 16px 24px;
      text-align: center;
    }
    .header-display h1 { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 800; }
    .header-display p { font-size: 13px; opacity: 0.9; }
    .lokasi-selector {
      display: flex; justify-content: center; gap: 12px; padding: 12px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .lokasi-btn {
      padding: 8px 20px; border-radius: 20px; border: 2px solid var(--border);
      background: var(--surface); font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all .3s;
    }
    .lokasi-btn.active { border-color: var(--primary); background: #DBEAFE; color: var(--primary); }
    .content { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 16px; overflow-y: auto; }
    .now-serving {
      background: var(--surface); border-radius: var(--radius);
      padding: 24px; text-align: center;
      border: 2px solid #DBEAFE;
      flex-shrink: 0;
    }
    .now-serving .label { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .now-serving .number {
      font-family: 'Poppins', sans-serif;
      font-size: 72px; font-weight: 900;
      background: linear-gradient(135deg, var(--primary), #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }
    .now-serving .empty { font-size: 24px; color: var(--muted); padding: 20px; }
    .queue-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .queue-list h3 {
      font-size: 14px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 4px;
    }
    .queue-item {
      background: var(--surface); border-radius: 12px;
      padding: 14px 16px; display: flex; justify-content: space-between;
      align-items: center; border: 1px solid var(--border);
    }
    .queue-item .nomor { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 20px; color: var(--text); }
    .queue-item .nama { font-size: 14px; color: var(--muted); }
    .queue-counts {
      display: flex; gap: 16px; justify-content: center; padding: 12px;
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); flex-shrink: 0;
    }
    .queue-counts span { font-size: 14px; }
    .queue-counts strong { font-size: 18px; }
    .completed-count { color: var(--success); }
    .waiting-count { color: var(--warning); }
    .last-update {
      text-align: center; font-size: 11px; color: var(--muted);
      padding: 8px; flex-shrink: 0;
    }
    @media (min-width: 768px) {
      .now-serving .number { font-size: 96px; }
      .content { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="header-display">
    <h1>🥟 Dimsum Denaya</h1>
    <p>— Status Antrian —</p>
  </div>
  <div class="lokasi-selector">
    <button class="lokasi-btn active" data-lokasi="kebon_kembang">🌸 Kebon Kembang</button>
    <button class="lokasi-btn" data-lokasi="rumah">🏠 Rumah</button>
  </div>
  <div class="content" id="content">
    <div class="now-serving" id="nowServing">
      <div class="label">Sedang Dilayani</div>
      <div class="empty">— Tidak ada antrian —</div>
    </div>
    <div class="queue-counts" id="queueCounts">
      <span>🚶 <strong id="countWaiting">0</strong> menunggu</span>
      <span>✅ <strong id="countDone">0</strong> selesai</span>
      <span>📋 <strong id="countTotal">0</strong> total</span>
    </div>
    <div class="queue-list" id="queueList">
      <h3>Antrian Selanjutnya</h3>
    </div>
    <div class="last-update" id="lastUpdate">Memperbarui...</div>
  </div>

  <script>
    let currentLokasi = 'kebon_kembang';

    async function loadDisplay() {
      try {
        const data = await ddGetDisplayData(currentLokasi);
        renderNowServing(data.sedang_dilayani);
        renderQueueList(data.menunggu);
        renderCounts(data.total_antrian, data.sisa_antrian, data.selesai.length);
        document.getElementById('lastUpdate').textContent = 'Terakhir update: ' + new Date().toLocaleTimeString('id-ID');
      } catch (e) {
        console.error('Display error:', e);
      }
    }

    function renderNowServing(serving) {
      const el = document.getElementById('nowServing');
      if (serving && serving.length > 0) {
        const s = serving[0];
        el.innerHTML = '<div class="label">Sedang Dilayani</div>' +
          '<div class="number">' + s.nomor_antrian + '</div>' +
          (s.nama_pelanggan ? '<p style="font-size:16px;color:var(--muted)">' + s.nama_pelanggan + '</p>' : '');
      } else {
        const waiting = document.querySelectorAll('.queue-item').length;
        if (waiting > 0) {
          el.innerHTML = '<div class="label">Sedang Dilayani</div><div class="empty">⏳ Segera...</div>';
        } else {
          el.innerHTML = '<div class="label">Sedang Dilayani</div><div class="empty">✅ Semua terlayani</div>';
        }
      }
    }

    function renderQueueList(waiting) {
      const container = document.getElementById('queueList');
      if (waiting.length === 0) {
        container.innerHTML = '<h3>Antrian Selanjutnya</h3><p style="color:var(--muted);text-align:center;padding:20px">Tidak ada antrian</p>';
        return;
      }
      const next = waiting.slice(0, 10);
      container.innerHTML = '<h3>Antrian Selanjutnya (' + waiting.length + ')</h3>' +
        next.map(function (a) {
          return '<div class="queue-item">' +
            '<span class="nomor">' + a.nomor_antrian + '</span>' +
            (a.nama_pelanggan ? '<span class="nama">' + a.nama_pelanggan + '</span>' : '<span class="nama">—</span>') +
          '</div>';
        }).join('');
    }

    function renderCounts(total, waiting, done) {
      document.getElementById('countTotal').textContent = total;
      document.getElementById('countWaiting').textContent = waiting;
      document.getElementById('countDone').textContent = done;
    }

    // Ganti lokasi
    document.querySelectorAll('.lokasi-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.lokasi-btn').forEach(function (b) { b.classList.remove('active'); });
        this.classList.add('active');
        currentLokasi = this.dataset.lokasi;
        loadDisplay();
      });
    });

    // Auto refresh tiap 5 detik
    document.addEventListener('DOMContentLoaded', function () {
      loadDisplay();
      setInterval(loadDisplay, 5000);
    });
  </script>
</body>
</html>
