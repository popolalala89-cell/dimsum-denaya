<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antrian Admin — Dimsum Denaya</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #f5f5f5; color: #2D2D2D; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    /* Login */
    #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #8B1E2D 0%, #5A3825 100%); }
    .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 8px; color: #8B1E2D; }
    .login-card p { color: #666; margin-bottom: 24px; font-size: 0.9rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 0.85rem; color: #444; }
    .form-input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-family: inherit; font-size: 0.95rem; transition: border-color 0.3s; }
    .form-input:focus { outline: none; border-color: #8B1E2D; }
    .btn { padding: 12px 24px; border: none; border-radius: 12px; font-family: inherit; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-primary { background: #8B1E2D; color: white; }
    .btn-primary:hover { background: #6B1522; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-success { background: #10B981; color: white; }
    .btn-success:hover { background: #059669; }
    .btn-warning { background: #F59E0B; color: white; }
    .btn-warning:hover { background: #D97706; }
    .btn-danger { background: #EF4444; color: white; }
    .btn-danger:hover { background: #DC2626; }
    .btn-sm { padding: 8px 14px; font-size: 0.82rem; }
    .btn-outline { background: transparent; border: 2px solid #e0e0e0; color: #666; }
    .btn-full { width: 100%; justify-content: center; }

    /* Nav */
    .nav-bar { background: white; border-bottom: 1px solid #e0e0e0; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
    .nav-bar h2 { font-size: 1.1rem; flex: 1; }
    .nav-bar a { text-decoration: none; color: #666; font-size: 0.85rem; }
    .nav-bar a:hover { color: #8B1E2D; }

    /* Status */
    .status-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: white; border-radius: 14px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .stat-card .num { font-size: 2rem; font-weight: 700; }
    .stat-card .label { font-size: 0.8rem; color: #666; margin-top: 2px; }
    .stat-card.green .num { color: #10B981; }
    .stat-card.yellow .num { color: #F59E0B; }
    .stat-card.blue .num { color: #3B82F6; }

    /* Lokasi tabs */
    .lokasi-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .lokasi-tab { padding: 10px 20px; border-radius: 12px; border: 2px solid #e0e0e0; background: white; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.3s; }
    .lokasi-tab.active { border-color: #8B1E2D; background: #FDF2F4; color: #8B1E2D; }

    /* Table */
    .card { background: white; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    .card-header h3 { font-size: 1rem; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 16px; font-size: 0.8rem; color: #666; border-bottom: 2px solid #f0f0f0; }
    td { padding: 12px 16px; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; }
    tr:hover { background: #FAFAFA; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
    .badge-menunggu { background: #FEF3C7; color: #92400E; }
    .badge-dilayani { background: #DBEAFE; color: #1E40AF; }
    .badge-selesai { background: #D1FAE5; color: #065F46; }
    .badge-batal { background: #FEE2E2; color: #991B1B; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* QR Section */
    .qr-section { margin-top: 20px; }
    .qr-card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; }
    .qr-card h4 { font-size: 0.95rem; margin-bottom: 8px; }
    .qr-url { background: #f5f5f5; padding: 10px 14px; border-radius: 10px; font-size: 0.82rem; word-break: break-all; margin-bottom: 8px; font-family: monospace; }
    .qr-actions { display: flex; gap: 8px; }

    /* Hidden */
    .hidden { display: none !important; }
    #app { display: none; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #10B981; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 500; font-size: 0.9rem; z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .toast.error { background: #EF4444; }

    /* Mobile */
    @media (max-width: 600px) {
      .status-bar { grid-template-columns: repeat(2, 1fr); }
      td, th { font-size: 0.8rem; padding: 8px 10px; }
    }
  </style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage">
  <div class="login-card">
    <h1>🥟 Admin Antrian</h1>
    <p>Masuk untuk kelola antrian Dimsum Denaya</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="admin@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-input" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-full" id="loginBtn">Masuk</button>
    <p id="loginError" style="color:#EF4444;font-size:0.85rem;margin-top:12px;text-align:center;display:none"></p>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="nav-bar">
    <h2>🥟 Antrian</h2>
    <a href="/admin/">Dashboard</a>
    <a href="/antrian/display.html" target="_blank">Display</a>
    <button class="btn btn-sm btn-outline" id="logoutBtn">Keluar</button>
  </div>

  <div class="container">
    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <div class="stat-card blue"><div class="num" id="statTotal">0</div><div class="label">Total Hari Ini</div></div>
      <div class="stat-card yellow"><div class="num" id="statWaiting">0</div><div class="label">Menunggu</div></div>
      <div class="stat-card green"><div class="num" id="statDone">0</div><div class="label">Selesai</div></div>
    </div>

    <!-- Lokasi tabs -->
    <div class="lokasi-tabs">
      <button class="lokasi-tab active" data-lokasi="kebon_kembang">🌸 Kebon Kembang</button>
      <button class="lokasi-tab" data-lokasi="rumah">🏠 Rumah</button>
    </div>

    <!-- Antrian Table -->
    <div class="card">
      <div class="card-header">
        <h3>Daftar Antrian</h3>
        <button class="btn btn-sm btn-primary" id="refreshBtn"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Antrian</th>
              <th>Nama</th>
              <th>Status</th>
              <th>Waktu</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="antrianBody"></tbody>
        </table>
      </div>
      <div id="antrianEmpty" style="padding:40px;text-align:center;color:#999">Belum ada antrian hari ini</div>
    </div>

    <!-- QR Code Management -->
    <div class="qr-section">
      <div class="qr-card" id="qrKebonKembang">
        <h4>🌸 QR Code — Kebon Kembang</h4>
        <div style="display:flex;gap:20px;align-items:start;flex-wrap:wrap">
          <div id="qrCodeKK" style="width:160px;height:160px;background:#f5f5f5;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999">Memuat...</div>
          <div style="flex:1;min-width:200px">
            <div class="qr-url" id="qrUrlKK">Memuat...</div>
            <div class="qr-actions" style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-sm btn-warning" onclick="regenerateQR('kebon_kembang')"><i class="bi bi-arrow-repeat"></i> Ganti Token</button>
              <button class="btn btn-sm btn-outline" onclick="copyQR('kebon_kembang')"><i class="bi bi-clipboard"></i> Copy URL</button>
              <button class="btn btn-sm btn-primary" onclick="printQR('kebon_kembang')"><i class="bi bi-printer"></i> Cetak</button>
            </div>
          </div>
        </div>
      </div>
      <div class="qr-card" id="qrRumah">
        <h4>🏠 QR Code — Rumah (Delivery)</h4>
        <div style="display:flex;gap:20px;align-items:start;flex-wrap:wrap">
          <div id="qrCodeRM" style="width:160px;height:160px;background:#f5f5f5;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#999">Memuat...</div>
          <div style="flex:1;min-width:200px">
            <div class="qr-url" id="qrUrlRM">Memuat...</div>
            <div class="qr-actions" style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-sm btn-warning" onclick="regenerateQR('rumah')"><i class="bi bi-arrow-repeat"></i> Ganti Token</button>
              <button class="btn btn-sm btn-outline" onclick="copyQR('rumah')"><i class="bi bi-clipboard"></i> Copy URL</button>
              <button class="btn btn-sm btn-primary" onclick="printQR('rumah')"><i class="bi bi-printer"></i> Cetak</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<script>
let currentLokasi = 'kebon_kembang';

// ============================================
// Auth
// ============================================
async function checkAuth() {
  const session = await ddGetSession();
  if (session) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
    loadQrTokens();
  }
}

document.getElementById('loginBtn').addEventListener('click', async function () {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) { showLoginError('Isi email dan password'); return; }

  this.disabled = true;
  this.textContent = 'Memproses...';

  try {
    await ddAdminLogin(email, pass);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData();
    loadQrTokens();
  } catch (e) {
    showLoginError('Email atau password salah');
    this.disabled = false;
    this.textContent = 'Masuk';
  }
});

document.getElementById('logoutBtn').addEventListener('click', async function () {
  await ddAdminLogout();
  location.reload();
});

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ============================================
// Load Antrian
// ============================================
async function loadData() {
  try {
    const data = await ddGetDisplayData(currentLokasi);
    const all = await ddGetAntrianList(currentLokasi);
    renderTable(all);
    updateStats(data);
  } catch (e) {
    console.error('Load data error:', e);
  }
}

function renderTable(list) {
  const body = document.getElementById('antrianBody');
  const empty = document.getElementById('antrianEmpty');

  if (!list || list.length === 0) {
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';

  body.innerHTML = list.map(function (a) {
    const statusClass = 'badge-' + a.status;
    const statusLabel = a.status.charAt(0).toUpperCase() + a.status.slice(1);
    const waktu = a.created_at ? new Date(a.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '—';

    let actionBtns = '';
    if (a.status === 'menunggu') {
      actionBtns = '<button class="btn btn-sm btn-success" onclick="serveAntrian(\'' + a.id + '\')"><i class="bi bi-check-lg"></i> Panggil</button>' +
        '<button class="btn btn-sm btn-danger" onclick="cancelAntrian(\'' + a.id + '\')"><i class="bi bi-x-lg"></i></button>';
    } else if (a.status === 'dilayani') {
      actionBtns = '<button class="btn btn-sm btn-success" onclick="doneAntrian(\'' + a.id + '\')"><i class="bi bi-check-all"></i> Selesai</button>';
    }

    return '<tr>' +
      '<td><strong>' + a.nomor_antrian + '</strong></td>' +
      '<td>' + (a.nama_pelanggan || '—') + '</td>' +
      '<td><span class="badge ' + statusClass + '">' + statusLabel + '</span></td>' +
      '<td>' + waktu + '</td>' +
      '<td class="actions">' + actionBtns + '</td>' +
    '</tr>';
  }).join('');
}

function updateStats(data) {
  document.getElementById('statTotal').textContent = data.total_antrian || 0;
  document.getElementById('statWaiting').textContent = data.sisa_antrian || 0;
  document.getElementById('statDone').textContent = (data.selesai || []).length;
}

// ============================================
// Actions
// ============================================
async function serveAntrian(id) {
  await ddUpdateAntrianStatus(id, 'dilayani');
  showToast('Antrian dipanggil!');
  loadData();
}

async function doneAntrian(id) {
  await ddUpdateAntrianStatus(id, 'selesai');
  showToast('Antrian selesai ✅');
  loadData();
}

async function cancelAntrian(id) {
  if (!confirm('Batalkan antrian ini?')) return;
  await ddUpdateAntrianStatus(id, 'batal');
  showToast('Antrian dibatalkan');
  loadData();
}

// ============================================
// QR Tokens
// ============================================
async function loadQrTokens() {
  const baseUrl = window.location.origin;
  const tokenKK = await ddGetQrToken('kebon_kembang');
  const tokenRM = await ddGetQrToken('rumah');

  const urlKK = baseUrl + '/antrian/?lokasi=kebon_kembang&token=' + (tokenKK || '');
  const urlRM = baseUrl + '/antrian/?lokasi=rumah&token=' + (tokenRM || '');

  document.getElementById('qrUrlKK').textContent = urlKK;
  document.getElementById('qrUrlRM').textContent = urlRM;

  // Generate QR codes
  document.getElementById('qrCodeKK').innerHTML = '';
  if (urlKK) {
    new QRCode(document.getElementById('qrCodeKK'), {
      text: urlKK,
      width: 160,
      height: 160,
      colorDark: '#1a1a1a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  document.getElementById('qrCodeRM').innerHTML = '';
  if (urlRM) {
    new QRCode(document.getElementById('qrCodeRM'), {
      text: urlRM,
      width: 160,
      height: 160,
      colorDark: '#1a1a1a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }
}

function printQR(lokasi) {
  const el = document.getElementById('qrCode' + (lokasi === 'kebon_kembang' ? 'KK' : 'RM'));
  const canvas = el.querySelector('canvas');
  if (!canvas) { alert('QR belum siap'); return; }

  const win = window.open('', '_blank');
  win.document.write('<html><head><title>QR Code ' + lokasi + '</title></head><body style="text-align:center;padding:40px">');
  win.document.write('<h2>Scan QR untuk Pesan</h2>');
  win.document.write('<h3>' + (lokasi === 'kebon_kembang' ? '🌸 Kebon Kembang' : '🏠 Rumah (Delivery)') + '</h3>');
  win.document.write('<img src="' + canvas.toDataURL() + '" style="width:300px;height:300px">');
  win.document.write('<p style="margin-top:20px;color:#666">' + document.getElementById('qrUrl' + (lokasi === 'kebon_kembang' ? 'KK' : 'RM')).textContent + '</p>');
  win.document.write('</body></html>');
  win.document.close();
  win.focus();
  win.print();
}

async function regenerateQR(lokasi) {
  if (!confirm('Ganti token QR untuk ' + (lokasi === 'kebon_kembang' ? 'Kebon Kembang' : 'Rumah') + '?\nQR lama tidak akan bisa dipakai lagi.')) return;

  try {
    const newToken = await ddRegenerateQrToken(lokasi);
    showToast('Token QR baru dibuat! Cetak QR baru ya.');
    loadQrTokens();
  } catch (e) {
    showToast('Gagal generate token', true);
  }
}

function copyQR(lokasi) {
  const el = document.getElementById(lokasi === 'kebon_kembang' ? 'qrUrlKK' : 'qrUrlRM');
  navigator.clipboard.writeText(el.textContent).then(function () {
    showToast('URL QR dicopy!');
  }).catch(function () {
    // Fallback select
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
}

// ============================================
// Navigation
// ============================================
document.querySelectorAll('.lokasi-tab').forEach(function (tab) {
  tab.addEventListener('click', function () {
    document.querySelectorAll('.lokasi-tab').forEach(function (t) { t.classList.remove('active'); });
    this.classList.add('active');
    currentLokasi = this.dataset.lokasi;
    loadData();
  });
});

document.getElementById('refreshBtn').addEventListener('click', function () {
  loadData();
  loadQrTokens();
  showToast('Diperbarui');
});

// ============================================
// Toast
// ============================================
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden', 'error');
  if (isError) el.classList.add('error');
  clearTimeout(el._timer);
  el._timer = setTimeout(function () { el.classList.add('hidden'); }, 3000);
}

// ============================================
// Init
// ============================================
document.addEventListener('DOMContentLoaded', checkAuth);
</script>
</body>
</html>
