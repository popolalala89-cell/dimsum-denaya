<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Dimsum Denaya</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* --- Reset & Base --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      color: #2D2D2D;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* --- Login --- */
    #loginPage {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #8B1E2D 0%, #5A3825 100%);
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #8B1E2D;
    }
    .login-card p {
      color: #666;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 0.85rem;
      color: #444;
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.3s;
    }
    .form-input:focus {
      outline: none;
      border-color: #8B1E2D;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: #8B1E2D;
      color: white;
      width: 100%;
      justify-content: center;
    }
    .btn-primary:hover { background: #6B1A22; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-danger:hover { background: #b02a37; }
    .btn-outline { background: transparent; border: 2px solid #8B1E2D; color: #8B1E2D; }
    .btn-outline:hover { background: #8B1E2D; color: white; }
    .btn-success { background: #10B981; color: white; }
    .btn-success:hover { background: #059669; }

    /* --- Dashboard --- */
    #dashboardPage { display: none; }
    .admin-header {
      background: white;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h2 { font-size: 1.2rem; color: #8B1E2D; }
    .admin-header .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #666;
    }

    /* --- Tabs --- */
    .tabs {
      display: flex;
      gap: 4px;
      background: white;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      overflow-x: auto;
    }
    .tab-btn {
      padding: 10px 20px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #666;
    }
    .tab-btn:hover { background: #f0f0f0; }
    .tab-btn--active {
      background: #8B1E2D;
      color: white;
    }
    .tab-btn .count {
      background: rgba(0,0,0,0.1);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
    }
    .tab-btn--active .count { background: rgba(255,255,255,0.2); }

    .tab-content { display: none; }
    .tab-content--active { display: block; }

    /* --- Table --- */
    .table-wrap {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .table-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #f0f0f0;
      flex-wrap: wrap;
      gap: 12px;
    }
    .table-header h3 { font-size: 1rem; }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f5f5f5;
      font-size: 0.85rem;
    }
    th {
      background: #fafafa;
      font-weight: 600;
      color: #666;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge--pending { background: #fef3c7; color: #92400e; }
    .badge--processed { background: #dbeafe; color: #1e40af; }
    .badge--completed { background: #d1fae5; color: #065f46; }
    .badge--cancelled { background: #fee2e2; color: #991b1b; }
    .badge--best { background: #fce7f3; color: #9d174d; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state i { font-size: 3rem; margin-bottom: 12px; }

    /* --- Modal --- */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay--open { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 16px; }

    /* --- Toast --- */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #2D2D2D;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      z-index: 2000;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
    }
    .toast--visible { opacity: 1; transform: translateY(0); }
    .toast--success { background: #10B981; }

    /* --- Loading --- */
    .loading { opacity: 0.5; pointer-events: none; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .container { padding: 12px; }
      .table-wrap { overflow-x: auto; }
      th, td { padding: 8px 10px; font-size: 0.8rem; }
      .admin-header .container { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

<!-- ========================================== -->
<!-- Login Page -->
<!-- ========================================== -->
<div id="loginPage">
  <div class="login-card">
    <h1>🔐 Admin Dimsum Denaya</h1>
    <p>Masuk untuk mengelola menu, testimoni, dan pesanan.</p>
    <div id="loginError" style="color:#dc3545;font-size:0.85rem;margin-bottom:12px;display:none;"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="admin@email.com" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        <span id="loginBtnText">Masuk</span>
        <span id="loginSpinner" class="spinner" style="display:none;"></span>
      </button>
    </form>
  </div>
</div>

<!-- ========================================== -->
<!-- Dashboard -->
<!-- ========================================== -->
<div id="dashboardPage">
  <div class="admin-header">
    <div class="container">
      <h2>🥟 Dimsum Denaya — Admin</h2>
      <div class="user-info">
        <a href="antrian.html" class="btn btn-sm" style="background:#8B1E2D;color:white;text-decoration:none">📋 Antrian</a>
        <span id="adminEmail"></span>
        <button class="btn btn-sm btn-outline" onclick="handleLogout()">Keluar</button>
      </div>
    </div>
  </div>
  <div class="container">
    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab-btn tab-btn--active" data-tab="menu" onclick="switchTab('menu')">
        <i class="bi bi-shop"></i> Menu
      </button>
      <button class="tab-btn" data-tab="testimoni" onclick="switchTab('testimoni')">
        <i class="bi bi-star"></i> Testimoni
      </button>
      <button class="tab-btn" data-tab="galeri" onclick="switchTab('galeri')">
        <i class="bi bi-images"></i> Galeri
      </button>
      <button class="tab-btn" data-tab="orders" onclick="switchTab('orders')">
        <i class="bi bi-cart"></i> Pesanan
      </button>
      <button class="tab-btn" data-tab="config" onclick="switchTab('config')">
        <i class="bi bi-gear"></i> Pengaturan
      </button>
    </div>

    <!-- Tab: Menu -->
    <div class="tab-content tab-content--active" id="tab-menu">
      <div class="table-wrap">
        <div class="table-header">
          <h3>📋 Daftar Menu</h3>
          <button class="btn btn-sm btn-primary" onclick="openModal('menu')">
            <i class="bi bi-plus"></i> Tambah Menu
          </button>
        </div>
        <div id="menuTableBody">
          <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>
        </div>
      </div>
    </div>

    <!-- Tab: Testimoni -->
    <div class="tab-content" id="tab-testimoni">
      <div class="table-wrap">
        <div class="table-header">
          <h3>💬 Testimoni</h3>
          <button class="btn btn-sm btn-primary" onclick="openModal('testimoni')">
            <i class="bi bi-plus"></i> Tambah Testimoni
          </button>
        </div>
        <div id="testimoniTableBody">
          <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>
        </div>
      </div>
    </div>

    <!-- Tab: Galeri -->
    <div class="tab-content" id="tab-galeri">
      <div class="table-wrap">
        <div class="table-header">
          <h3>🖼️ Galeri</h3>
          <button class="btn btn-sm btn-primary" onclick="openModal('galeri')">
            <i class="bi bi-plus"></i> Tambah Galeri
          </button>
        </div>
        <div id="galeriTableBody">
          <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>
        </div>
      </div>
    </div>

    <!-- Tab: Orders -->
    <div class="tab-content" id="tab-orders">
      <div class="table-wrap">
        <div class="table-header">
          <h3>📦 Pesanan</h3>
          <div>
            <select id="orderFilter" onchange="loadOrders()" style="padding:6px 12px;border:2px solid #e0e0e0;border-radius:8px;font-family:inherit;">
              <option value="">Semua Status</option>
              <option value="pending">Pending</option>
              <option value="processed">Processed</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
        </div>
        <div id="ordersTableBody">
          <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>
        </div>
      </div>
    </div>

    <!-- Tab: Config -->
    <div class="tab-content" id="tab-config">
      <div class="table-wrap">
        <div class="table-header">
          <h3>⚙️ Pengaturan</h3>
          <button class="btn btn-sm btn-success" onclick="saveConfig()">
            <i class="bi bi-check"></i> Simpan
          </button>
        </div>
        <div style="padding:20px;" id="configForm">
          <div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ========================================== -->
<!-- Modal -->
<!-- ========================================== -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <h3 id="modalTitle">Tambah Data</h3>
    <form id="modalForm">
      <div id="modalFields"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button type="button" class="btn btn-sm btn-outline" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn btn-sm btn-primary" id="modalSubmitBtn">
          <span id="modalSubmitText">Simpan</span>
          <span id="modalSubmitSpinner" class="spinner" style="display:none;"></span>
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ========================================== -->
<!-- Toast -->
<!-- ========================================== -->
<div class="toast" id="toast"></div>

<!-- ========================================== -->
<!-- Scripts -->
<!-- ========================================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase.js"></script>
<script>
(function () {
  'use strict';

  let currentUser = null;
  let editingId = null;
  let editingType = null;

  // ==========================================
  // Auth
  // ==========================================
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    setLoginLoading(true);
    document.getElementById('loginError').style.display = 'none';

    try {
      const result = await ddAdminLogin(email, password);
      if (result && result.user) {
        currentUser = result.user;
        showDashboard();
      }
    } catch (err) {
      document.getElementById('loginError').textContent = 'Login gagal: ' + err.message;
      document.getElementById('loginError').style.display = 'block';
    } finally {
      setLoginLoading(false);
    }
  });

  function setLoginLoading(loading) {
    document.getElementById('loginBtnText').style.display = loading ? 'none' : 'inline';
    document.getElementById('loginSpinner').style.display = loading ? 'inline-block' : 'none';
    document.getElementById('loginBtn').disabled = loading;
  }

  async function handleLogout() {
    await ddAdminLogout();
    currentUser = null;
    document.getElementById('dashboardPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
  }

  async function checkSession() {
    try {
      const session = await ddGetSession();
      if (session) {
        currentUser = session.user;
        showDashboard();
      }
    } catch (e) {
      console.log('No session');
    }
  }

  function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboardPage').style.display = 'block';
    document.getElementById('adminEmail').textContent = currentUser.email;

    // Load all tabs
    loadMenu();
    loadTestimoni();
    loadGaleri();
    loadOrders();
    loadConfig();
  }

  // ==========================================
  // Tab Switching
  // ==========================================
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.classList.toggle('tab-btn--active', btn.dataset.tab === name);
    });
    document.querySelectorAll('.tab-content').forEach(function (el) {
      el.classList.toggle('tab-content--active', el.id === 'tab-' + name);
    });
  }

  // ==========================================
  // Toast
  // ==========================================
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (type === 'success' ? ' toast--visible toast--success' : ' toast--visible');
    setTimeout(function () { el.classList.remove('toast--visible'); }, 2500);
  }

  // ==========================================
  // Menu
  // ==========================================
  async function loadMenu() {
    const container = document.getElementById('menuTableBody');
    container.innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>';
    try {
      const data = await ddGetMenu();
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>Belum ada menu.</p></div>';
        return;
      }
      let html = '<table><thead><tr><th>Menu</th><th>Harga</th><th>Badge</th><th>Kategori</th><th>Aksi</th></tr></thead><tbody>';
      data.forEach(function (item) {
        html += '<tr>' +
          '<td><strong>' + item.nama + '</strong></td>' +
          '<td>Rp ' + item.harga.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '</td>' +
          '<td>' + (item.badge ? '<span class="badge badge--best">' + item.badge + '</span>' : '-') + '</td>' +
          '<td>' + item.kategori + '</td>' +
          '<td>' +
            '<button class="btn btn-sm btn-outline" onclick="editMenu(\'' + item.menu_id + '\')" style="margin-right:4px"><i class="bi bi-pencil"></i></button> ' +
            '<button class="btn btn-sm btn-danger" onclick="deleteMenu(\'' + item.menu_id + '\')"><i class="bi bi-trash"></i></button>' +
          '</td>' +
        '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (e) {
      container.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Gagal memuat: ' + e.message + '</p></div>';
    }
  }

  function editMenu(menuId) {
    openModal('menu', menuId);
  }

  async function deleteMenu(menuId) {
    if (!confirm('Hapus menu ini?')) return;
    try {
      await ddDeleteMenuItem(menuId);
      showToast('Menu dihapus', 'success');
      loadMenu();
    } catch (e) {
      showToast('Gagal: ' + e.message);
    }
  }

  // ==========================================
  // Testimoni
  // ==========================================
  async function loadTestimoni() {
    const container = document.getElementById('testimoniTableBody');
    container.innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>';
    try {
      const data = await ddGetTestimoni();
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>Belum ada testimoni.</p></div>';
        return;
      }
      let html = '<table><thead><tr><th>Nama</th><th>Rating</th><th>Testimoni</th><th>Aksi</th></tr></thead><tbody>';
      data.forEach(function (item) {
        const stars = '★'.repeat(item.rating) + '☆'.repeat(5 - item.rating);
        html += '<tr>' +
          '<td><strong>' + item.nama + '</strong></td>' +
          '<td style="color:#D9A441">' + stars + '</td>' +
          '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + item.teks + '</td>' +
          '<td><button class="btn btn-sm btn-danger" onclick="deleteTestimoni(\'' + item.id + '\')"><i class="bi bi-trash"></i></button></td>' +
        '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (e) {
      container.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Gagal memuat: ' + e.message + '</p></div>';
    }
  }

  async function deleteTestimoni(id) {
    if (!confirm('Hapus testimoni ini?')) return;
    try {
      await ddDeleteTestimoni(id);
      showToast('Testimoni dihapus', 'success');
      loadTestimoni();
    } catch (e) {
      showToast('Gagal: ' + e.message);
    }
  }

  // ==========================================
  // Galeri
  // ==========================================
  async function loadGaleri() {
    const container = document.getElementById('galeriTableBody');
    container.innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>';
    try {
      const data = await ddGetGaleri();
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>Belum ada galeri.</p></div>';
        return;
      }
      let html = '<table><thead><tr><th>Gambar</th><th>Alt Text</th><th>Kategori</th><th>Aksi</th></tr></thead><tbody>';
      data.forEach(function (item) {
        html += '<tr>' +
          '<td><img src="../' + item.src + '" alt="' + item.alt + '" style="width:60px;height:60px;object-fit:cover;border-radius:8px;" onerror="this.style.display=\'none\'"></td>' +
          '<td>' + item.alt + '</td>' +
          '<td>' + item.kategori + '</td>' +
          '<td><button class="btn btn-sm btn-danger" onclick="deleteGaleri(\'' + item.id + '\')"><i class="bi bi-trash"></i></button></td>' +
        '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (e) {
      container.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Gagal memuat: ' + e.message + '</p></div>';
    }
  }

  async function deleteGaleri(id) {
    if (!confirm('Hapus galeri ini?')) return;
    try {
      await ddDeleteGaleri(id);
      showToast('Galeri dihapus', 'success');
      loadGaleri();
    } catch (e) {
      showToast('Gagal: ' + e.message);
    }
  }

  // ==========================================
  // Orders
  // ==========================================
  async function loadOrders() {
    const container = document.getElementById('ordersTableBody');
    const filter = document.getElementById('orderFilter').value;
    container.innerHTML = '<div class="empty-state"><i class="bi bi-hourglass-split"></i><p>Memuat...</p></div>';
    try {
      const data = await ddGetOrders(filter || null);
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="bi bi-inbox"></i><p>Belum ada pesanan.</p></div>';
        return;
      }
      let html = '<table><thead><tr><th>Order ID</th><th>Nama</th><th>No. HP</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead><tbody>';
      data.forEach(function (item) {
        const statusClass = 'badge badge--' + item.status;
        const date = new Date(item.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
        html += '<tr>' +
          '<td><code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:0.8rem;">' + item.order_id + '</code></td>' +
          '<td>' + item.name + '</td>' +
          '<td>' + item.phone + '</td>' +
          '<td><span class="' + statusClass + '">' + item.status + '</span></td>' +
          '<td>' + date + '</td>' +
          '<td>' +
            '<select onchange="updateOrderStatus(\'' + item.order_id + '\', this.value)" style="padding:4px 8px;border:2px solid #e0e0e0;border-radius:8px;font-family:inherit;font-size:0.8rem;">' +
              '<option value="pending"' + (item.status === 'pending' ? ' selected' : '') + '>Pending</option>' +
              '<option value="processed"' + (item.status === 'processed' ? ' selected' : '') + '>Processed</option>' +
              '<option value="completed"' + (item.status === 'completed' ? ' selected' : '') + '>Completed</option>' +
              '<option value="cancelled"' + (item.status === 'cancelled' ? ' selected' : '') + '>Cancelled</option>' +
            '</select>' +
          '</td>' +
        '</tr>';
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (e) {
      container.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Gagal memuat: ' + e.message + '</p></div>';
    }
  }

  async function updateOrderStatus(orderId, status) {
    try {
      await ddUpdateOrderStatus(orderId, status);
      showToast('Status diperbarui', 'success');
      loadOrders();
    } catch (e) {
      showToast('Gagal: ' + e.message);
    }
  }

  // ==========================================
  // Config
  // ==========================================
  async function loadConfig() {
    const container = document.getElementById('configForm');
    try {
      const data = await ddGetAllConfig();
      if (!data || Object.keys(data).length === 0) {
        container.innerHTML = '<p>Belum ada pengaturan. Jalankan SQL schema dulu.</p>';
        return;
      }
      let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';
      for (const key in data) {
        const displayLabel = key.replace(/_/g, ' ').replace(/\b\w/g, function (c) { return c.toUpperCase(); });
        html += '<div class="form-group"><label>' + displayLabel + '</label>' +
          '<input type="text" class="form-input" id="cfg-' + key + '" value="' + (data[key] || '') + '"></div>';
      }
      html += '</div>';
      container.innerHTML = html;
    } catch (e) {
      container.innerHTML = '<p>Gagal memuat: ' + e.message + '</p>';
    }
  }

  async function saveConfig() {
    const sb = ddInitSupabase();
    if (!sb) { showToast('Supabase belum dikonfigurasi'); return; }

    const inputs = document.querySelectorAll('#configForm .form-input');
    try {
      for (const input of inputs) {
        const key = input.id.replace('cfg-', '');
        const value = input.value;
        await sb.from('config').upsert({ key: key, value: value }, { onConflict: 'key' });
      }
      showToast('Pengaturan tersimpan', 'success');
    } catch (e) {
      showToast('Gagal: ' + e.message);
    }
  }

  // ==========================================
  // Modal
  // ==========================================
  function openModal(type, editId) {
    editingType = type;
    editingId = editId || null;
    const modal = document.getElementById('formModal');
    const title = document.getElementById('modalTitle');
    const fields = document.getElementById('modalFields');

    if (type === 'menu') {
      title.textContent = editingId ? 'Edit Menu' : 'Tambah Menu';
      fields.innerHTML = `
        <div class="form-group"><label>Nama Menu</label><input type="text" class="form-input" id="f-nama" required></div>
        <div class="form-group"><label>Harga (Rp)</label><input type="number" class="form-input" id="f-harga" required></div>
        <div class="form-group"><label>Badge (opsional)</label><input type="text" class="form-input" id="f-badge" placeholder="Best Seller, Favorit..."></div>
        <div class="form-group"><label>Kategori</label>
          <select class="form-input" id="f-kategori">
            <option value="dimsum">Dimsum</option>
            <option value="lumpia">Lumpia</option>
            <option value="bakpao">Bakpao</option>
            <option value="minuman">Minuman</option>
          </select>
        </div>
        <div class="form-group">
          <label>Foto Menu</label>
          <div style="display:flex;gap:12px;align-items:center">
            <input type="file" class="form-input" id="f-gambar" accept="image/*" style="flex:1">
            <div id="gambarPreview" style="width:60px;height:60px;border-radius:8px;overflow:hidden;background:#f5f5f5;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:24px">📷</div>
          </div>
          <p style="font-size:12px;color:#666;margin-top:4px">Format: JPG/PNG. Maks 1MB. Foto akan otomatis di-compress.</p>
        </div>
        <div class="form-group"><label>Deskripsi</label><textarea class="form-input" id="f-deskripsi" rows="2"></textarea></div>
      `;
      // Init file preview
      setTimeout(function(){initGambarUpload();}, 50);
    } else if (type === 'testimoni') {
      title.textContent = 'Tambah Testimoni';
      fields.innerHTML = `
        <div class="form-group"><label>Nama</label><input type="text" class="form-input" id="f-nama" required></div>
        <div class="form-group"><label>Rating (1-5)</label><input type="number" class="form-input" id="f-rating" value="5" min="1" max="5"></div>
        <div class="form-group"><label>Testimoni</label><textarea class="form-input" id="f-teks" rows="3" required></textarea></div>
        <div class="form-group"><label>Path Avatar</label><input type="text" class="form-input" id="f-avatar" placeholder="assets/images/testimoni/1.svg"></div>
      `;
    } else if (type === 'galeri') {
      title.textContent = 'Tambah Galeri';
      fields.innerHTML = `
        <div class="form-group"><label>Path Gambar</label><input type="text" class="form-input" id="f-src" required placeholder="assets/images/gallery/nama.svg"></div>
        <div class="form-group"><label>Alt Text</label><input type="text" class="form-input" id="f-alt" required></div>
        <div class="form-group"><label>Kategori</label>
          <select class="form-input" id="f-kategori">
            <option value="produk">Produk</option>
            <option value="produksi">Produksi</option>
            <option value="outlet">Outlet</option>
            <option value="packing">Packing</option>
            <option value="customer">Customer</option>
          </select>
        </div>
        <div class="form-group"><label>Urutan</label><input type="number" class="form-input" id="f-urutan" value="1"></div>
      `;
    }

    modal.classList.add('modal-overlay--open');
  }

  function closeModal() {
    document.getElementById('formModal').classList.remove('modal-overlay--open');
    editingId = null;
    editingType = null;
  }

  // Image upload handler — kompres & preview
  function initGambarUpload() {
    const input = document.getElementById('f-gambar');
    if (!input) return;
    // Remove old listener to avoid duplicates
    input.removeEventListener('change', handleGambarChange);
    input.addEventListener('change', handleGambarChange);
  }

  function handleGambarChange() {
    const file = this.files && this.files[0];
    const preview = document.getElementById('gambarPreview');
    if (!file) return;

    // Cek size (max 1MB)
    if (file.size > 1048576) {
      alert('File terlalu besar! Maks 1MB.');
      this.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = function (e) {
      const img = new Image();
      img.onload = function () {
        // Kompres ke maks 400px
        const maxW = 400, maxH = 400;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        if (h > maxH) { w = w * maxH / h; h = maxH; }

        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        // Simpan data URL ke input
        const gambarData = canvas.toDataURL('image/jpeg', 0.7);
        input._gambarData = gambarData;

        // Preview
        preview.innerHTML = '<img src="' + gambarData + '" style="width:60px;height:60px;object-fit:cover;border-radius:8px">';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('modalForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    const submitBtn = document.getElementById('modalSubmitBtn');
    submitBtn.disabled = true;
    document.getElementById('modalSubmitText').style.display = 'none';
    document.getElementById('modalSubmitSpinner').style.display = 'inline-block';

    try {
      if (editingType === 'menu') {
        // Kompres gambar jika ada file baru
        const gambarInput = document.getElementById('f-gambar');
        let gambarData = gambarInput._gambarData || '';

        const data = {
          menu_id: (editingId || document.getElementById('f-nama').value.toLowerCase().replace(/\\s+/g, '-')),
          nama: document.getElementById('f-nama').value,
          harga: parseInt(document.getElementById('f-harga').value),
          badge: document.getElementById('f-badge').value || '',
          kategori: document.getElementById('f-kategori').value,
          gambar: gambarData,
          deskripsi: document.getElementById('f-deskripsi').value || ''
        };
        if (editingId) {
          await ddUpdateMenuItem(editingId, data);
        } else {
          await ddAddMenuItem(data);
        }
        showToast('Menu tersimpan', 'success');
        loadMenu();
      } else if (editingType === 'testimoni') {
        await ddAddTestimoni({
          nama: document.getElementById('f-nama').value,
          rating: parseInt(document.getElementById('f-rating').value),
          teks: document.getElementById('f-teks').value,
          avatar: document.getElementById('f-avatar').value || ''
        });
        showToast('Testimoni tersimpan', 'success');
        loadTestimoni();
      } else if (editingType === 'galeri') {
        await ddAddGaleri({
          src: document.getElementById('f-src').value,
          alt: document.getElementById('f-alt').value,
          kategori: document.getElementById('f-kategori').value,
          urutan: parseInt(document.getElementById('f-urutan').value)
        });
        showToast('Galeri tersimpan', 'success');
        loadGaleri();
      }
      closeModal();
    } catch (e) {
      showToast('Gagal: ' + e.message);
    } finally {
      submitBtn.disabled = false;
      document.getElementById('modalSubmitText').style.display = 'inline';
      document.getElementById('modalSubmitSpinner').style.display = 'none';
    }
  });

  // Close modal on overlay click
  document.getElementById('formModal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  // ==========================================
  // Init
  // ==========================================
  checkSession();

  // Expose functions globally
  window.switchTab = switchTab;
  window.openModal = openModal;
  window.closeModal = closeModal;
  window.handleLogout = handleLogout;
  window.editMenu = editMenu;
  window.deleteMenu = deleteMenu;
  window.deleteTestimoni = deleteTestimoni;
  window.deleteGaleri = deleteGaleri;
  window.loadOrders = loadOrders;
  window.updateOrderStatus = updateOrderStatus;
  window.saveConfig = saveConfig;

})();
</script>
</body>
</html>
